services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
    ports:
      - "${SQLSERVER_PORT}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - taskms-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s

  backend:
    build:
      context: .
      dockerfile: src/backend/TaskManagementSystem.Api/Dockerfile
    container_name: taskms-backend
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      Database__UseInMemory: "false"
      AdminUserSeed__Enabled: ${ADMIN_USER_SEED_ENABLED}
      AdminUserSeed__FirstName: ${ADMIN_USER_SEED_FIRSTNAME}
      AdminUserSeed__LastName: ${ADMIN_USER_SEED_LASTNAME}
      AdminUserSeed__Email: ${ADMIN_USER_SEED_EMAIL}
      AdminUserSeed__Password: ${ADMIN_USER_SEED_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=${SQLSERVER_DATABASE};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - taskms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    container_name: taskms-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskms-network

networks:
  taskms-network:
    driver: bridge

volumes:
  sqlserver-data:
