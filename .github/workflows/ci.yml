name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Build, test and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore frontend
        working-directory: src/frontend
        run: npm ci

      - name: Restore backend
        run: dotnet restore TaskManagementSystem.sln

      - name: Frontend lint
        working-directory: src/frontend
        run: npm run lint

      - name: Frontend format check
        working-directory: src/frontend
        run: npm run format

      - name: Frontend build
        working-directory: src/frontend
        run: npm run build

      - name: Frontend tests
        working-directory: src/frontend
        run: npm run test

      - name: Frontend coverage
        working-directory: src/frontend
        run: npm run test:coverage

      - name: Backend build
        run: dotnet build TaskManagementSystem.sln --no-restore --configuration Release

      - name: Backend tests
        run: dotnet test TaskManagementSystem.sln --no-build --configuration Release --logger "trx;LogFileName=backend-tests.trx"

      - name: Backend coverage
        run: >
          dotnet test TaskManagementSystem.sln
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --settings tests/backend/coverage.runsettings
          --results-directory TestResults/backend-coverage

      - name: Publish frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: src/frontend/coverage
          if-no-files-found: error

      - name: Publish backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: TestResults/backend-coverage/**/coverage.cobertura.xml
          if-no-files-found: error

      - name: Publish backend test results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            **/TestResults/**/*.trx
            TestResults/**/*.trx
          if-no-files-found: warn
